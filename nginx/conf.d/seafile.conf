upstream seafile-web {
    server seafile:80;
}

upstream seafile-fileserver {
    server seafile:8082;
}

server {
    listen 9455 ssl http2;
    server_name bitalaserver.hopto.org;

    ssl_certificate     /etc/letsencrypt/live/bitalaserver.hopto.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bitalaserver.hopto.org/privkey.pem;

    client_max_body_size 1000m;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # Cabeceras típicas detrás de proxy HTTPS
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;

    # UI (Seahub)
    location / {
        proxy_pass http://seafile-web;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_redirect off;
    }

    # File server (/seafhttp)
    location /seafhttp {
        proxy_pass http://seafile-fileserver/;

        proxy_http_version 1.1;
        proxy_request_buffering off;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_force_ranges on;

        client_max_body_size 0;
        proxy_connect_timeout 36000s;
        proxy_read_timeout 36000s;
        send_timeout 36000s;
    }
}
